<!DOCTYPE html>
<html>
<head>
<title>Grid Magazine</title>
<link rel="stylesheet" href="../styles/magazine_grid.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="magazine">

<header>
    <h1>My Magazine</h1>
</header>

<article class="main">
    <img src="images/mgzn1.jpeg" alt="Main News">
    <h2>Main Article</h2>
    <p>The main highlighted news of the magazine.</p>
</article>

<article class="side">
    <img src="images/mgzn2.jpeg" alt="Side Story">
    <h2>Side Story</h2>
    <p>Additional story content.</p>
</article>

<article class="extra">
    <img src="images/mgzn3.jpeg" alt="Extra News">
    <h2>Extra News</h2>
    <p>More updates and news.</p>
</article>

<footer>
    <p>© 2026 Magazine Layout</p>
</footer>

</div>

</body>
</html>
