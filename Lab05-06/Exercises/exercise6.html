<!DOCTYPE html>
<html>
<head>
  <title>Position Practical Examples</title>
  <style>
    /* 1. Overlapping elements using z-index */
    .overlap-container {
      position: relative;
      height: 150px;
      margin-bottom: 20px;
    }
    .box1 {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 100px;
      height: 100px;
      background: #ffb6c1;
      z-index: 1;
    }
    .box2 {
      position: absolute;
      top: 50px;
      left: 50px;
      width: 100px;
      height: 100px;
      background: #87ceeb;
      z-index: 2;
    }

    /* 2. Modal dialog */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .modal {
      background: white;
      padding: 20px;
      border-radius: 5px;
      width: 300px;
    }

    /* 3. Sticky navigation header */
    .nav {
      position: sticky;
      top: 0;
      background: #32cd32;
      padding: 10px;
      margin-bottom: 20px;
    }

    /* 4. Tooltip */
    .tooltip {
      position: relative;
      display: inline-block;
      cursor: pointer;
      margin-right: 20px;
    }
    .tooltip .tooltiptext {
      visibility: hidden;
      position: absolute;
      bottom: 125%; /* above element */
      left: 50%;
      transform: translateX(-50%);
      background-color: black;
      color: #fff;
      padding: 5px 10px;
      border-radius: 5px;
      white-space: nowrap;
      z-index: 10;
    }
    .tooltip:hover .tooltiptext {
      visibility: visible;
    }
  </style>
</head>
<body>

<h2>1. Overlapping Elements with z-index</h2>
<div class="overlap-container">
  <div class="box1"></div>
  <div class="box2"></div>
</div>

<h2>2. Modal Dialog Example</h2>
<button onclick="document.getElementById('modal').style.display='flex'">Open Modal</button>
<div id="modal" class="modal-overlay">
  <div class="modal">
    <h3>Modal Title</h3>
    <p>This is a modal dialog.</p>
    <button onclick="document.getElementById('modal').style.display='none'">Close</button>
  </div>
</div>

<h2>3. Sticky Navigation Header</h2>
<div class="nav">Sticky Navigation (scroll down to see)</div>
<div style="height: 600px; background: #f0f0f0;">Content to scroll...</div>

<h2>4. Tooltip Example</h2>
<div class="tooltip">Hover me
  <span class="tooltiptext">Tooltip text!</span>
</div>

</body>
</html>
