<!DOCTYPE html>
<html>
<head>
  <title>Flex Container Examples</title>
  <style>
    .flex-container {
      display: flex; /* create flex container */
      border: 1px solid #000;
      padding: 10px;
      margin-bottom: 20px;
      background: #f0f8ff;
    }

    /* flex-direction */
    .flex-row { flex-direction: row; }
    .flex-row-reverse { flex-direction: row-reverse; }
    .flex-column { flex-direction: column; }
    .flex-column-reverse { flex-direction: column-reverse; }

    /* flex-wrap */
    .wrap { flex-wrap: wrap; }
    .nowrap { flex-wrap: nowrap; }

    /* justify-content (main axis) */
    .justify-start { justify-content: flex-start; }
    .justify-center { justify-content: center; }
    .justify-end { justify-content: flex-end; }
    .justify-space-between { justify-content: space-between; }
    .justify-space-around { justify-content: space-around; }

    /* align-items (cross axis) */
    .align-start { align-items: flex-start; }
    .align-center { align-items: center; }
    .align-end { align-items: flex-end; }
    .align-stretch { align-items: stretch; }

    /* align-content for multi-line */
    .align-content-start { align-content: flex-start; flex-wrap: wrap; height: 200px; }
    .align-content-center { align-content: center; flex-wrap: wrap; height: 200px; }
    .align-content-space-between { align-content: space-between; flex-wrap: wrap; height: 200px; }

    .flex-item {
      background: #90ee90;
      padding: 20px;
      margin: 5px;
      min-width: 50px;
      text-align: center;
    }
  </style>
</head>
<body>

<h2>Flex Container Examples</h2>

<div class="flex-container flex-row justify-space-between align-center">
  <div class="flex-item">1</div>
  <div class="flex-item">2</div>
  <div class="flex-item">3</div>
</div>

<div class="flex-container flex-column align-start">
  <div class="flex-item">A</div>
  <div class="flex-item">B</div>
  <div class="flex-item">C</div>
</div>

</body>
</html>
