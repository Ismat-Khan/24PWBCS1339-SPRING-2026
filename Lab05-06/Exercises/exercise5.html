<!DOCTYPE html>
<html>
<head>
  <title>CSS Position Examples</title>
  <style>
    /* 1. Static (default) */
    .static-box {
      position: static;
      background: lightblue;
      padding: 10px;
      margin-bottom: 10px;
    }

    /* 2. Relative */
    .relative-box {
      position: relative;
      top: 10px;
      left: 20px;
      background: lightgreen;
      padding: 10px;
      margin-bottom: 10px;
    }

    /* 3. Absolute */
    .absolute-container {
      position: relative; /* ancestor for absolute child */
      height: 150px;
      background: #f0e68c;
      margin-bottom: 10px;
    }
    .absolute-box {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #ffb6c1;
      padding: 10px;
    }

    /* 4. Fixed */
    .fixed-box {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #87ceeb;
      padding: 10px;
    }

    /* 5. Sticky */
    .sticky-box {
      position: sticky;
      top: 0;
      background: #ffa07a;
      padding: 10px;
      margin-bottom: 20px;
    }

    .content {
      height: 800px; /* to scroll for sticky demo */
      background: #f5f5f5;
    }
  </style>
</head>
<body>

<h2>1. Static Position</h2>
<div class="static-box">Static Box (default flow)</div>

<h2>2. Relative Position</h2>
<div class="relative-box">Relative Box (offset from normal)</div>

<h2>3. Absolute Position</h2>
<div class="absolute-container">
  Container (relative)
  <div class="absolute-box">Absolute Box</div>
</div>

<h2>4. Fixed Position</h2>
<div class="fixed-box">Fixed Box (stays on screen)</div>

<h2>5. Sticky Position</h2>
<div class="sticky-box">Sticky Box (sticks on scroll)</div>
<div class="content">Scroll down to see sticky in action...</div>

</body>
</html>
