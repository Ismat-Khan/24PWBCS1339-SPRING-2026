<!DOCTYPE html>
<html>
<head>
  <title>Display Property Examples</title>
  <style>
    /* Block example */
    div.block {
      display: block;
      width: 200px;
      height: 50px;
      background: lightblue;
      margin-bottom: 10px;
    }

    /* Inline example */
    span.inline {
      display: inline;
      background: lightgreen;
      padding: 5px;
      margin-right: 5px;
    }

    /* Inline-block example */
    div.inline-block {
      display: inline-block;
      width: 150px;
      height: 50px;
      background: lightcoral;
      margin-right: 5px;
    }

    /* None vs hidden */
    div.hidden {
      visibility: hidden; /* hidden but occupies space */
      background: yellow;
      width: 100px;
      height: 50px;
      margin-bottom: 10px;
    }

    div.none {
      display: none; /* completely removed */
      background: pink;
      width: 100px;
      height: 50px;
    }
  </style>
</head>
<body>

<h2>Block Example</h2>
<div class="block">Block Element</div>

<h2>Inline Example</h2>
<span class="inline">Inline 1</span>
<span class="inline">Inline 2</span>

<h2>Inline-Block Example</h2>
<div class="inline-block">Inline-Block 1</div>
<div class="inline-block">Inline-Block 2</div>

<h2>Visibility vs Display None</h2>
<div class="hidden">Hidden Element</div>
<div class="none">None Element</div>

</body>
</html>
