<div class="container">
<h1>Student Registration Form</h1>

<form name="registration" method="POST" data-netlify="true">
  <input type="hidden" name="form-name" value="registration">

  <!-- Full Name -->
  <label>Full Name:</label><br>
  <input type="text" name="fullName" required><br><br>

  <!-- Registration Number -->
  <label>Registration Number:</label><br>
  <input type="text" name="regNo" required><br><br>

  <!-- Email -->
  <label>Email:</label><br>
  <input type="email" name="email" required><br><br>

  <!-- Password -->
  <label>Password:</label><br>
  <input type="password" name="password" required><br><br>

  <!-- Select Course -->
  <label>Select Course:</label><br>
  <select name="course">
      <option>Web Technologies</option>
      <option>DBMS</option>
      <option>OOP</option>
      <option>Artificial Intelligence</option>
  </select><br><br>

  <!-- Semester -->
  <label>Semester:</label><br>
  <input type="radio" name="semester" value="1st"> 1st
  <input type="radio" name="semester" value="2nd"> 2nd
  <input type="radio" name="semester" value="3rd"> 3rd
  <br><br>

  <input type="checkbox" name="terms" required> I agree to Terms & Conditions<br><br>

  <input type="submit" value="Register">
</form>

<br>

</div>
</body>
